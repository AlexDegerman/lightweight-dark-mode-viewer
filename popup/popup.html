<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Lightweight Dark Mode Viewer</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        width: 240px;
        background: #0f0f0f;
        color: #e8e8e8;
        font-family: 'Segoe UI', system-ui, sans-serif;
        padding: 20px;
        user-select: none;
      }

      .header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 18px;
      }

      .icon {
        width: 28px;
        height: 28px;
        background: linear-gradient(135deg, #1a1a2e, #16213e);
        border: 1px solid #2a2a4a;
        border-radius: 7px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 15px;
        flex-shrink: 0;
      }

      .title {
        font-size: 12px;
        font-weight: 600;
        color: #aaa;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .toggle-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: #181818;
        border: 1px solid #2a2a2a;
        border-radius: 10px;
        padding: 12px 14px;
        transition: border-color 0.15s;
      }

      .toggle-row.active {
        border-color: #4a7fff44;
        background: #111825;
      }
      .toggle-row.disabled {
        opacity: 0.5;
      }

      .toggle-label {
        font-size: 14px;
        font-weight: 500;
        color: #ccc;
      }
      .toggle-label span {
        display: block;
        font-size: 11px;
        color: #555;
        font-weight: 400;
        margin-top: 1px;
      }

      .switch {
        position: relative;
        width: 40px;
        height: 22px;
        flex-shrink: 0;
      }
      .switch input {
        opacity: 0;
        width: 0;
        height: 0;
        position: absolute;
      }

      .slider {
        position: absolute;
        inset: 0;
        background: #2a2a2a;
        border-radius: 22px;
        transition: background 0.2s;
        cursor: pointer;
      }

      .slider::before {
        content: '';
        position: absolute;
        height: 16px;
        width: 16px;
        left: 3px;
        top: 3px;
        background: #666;
        border-radius: 50%;
        transition:
          transform 0.2s,
          background 0.2s;
      }

      input:checked + .slider {
        background: #1a3a7a;
      }
      input:checked + .slider::before {
        transform: translateX(18px);
        background: #4a7fff;
      }
      input:disabled + .slider {
        opacity: 0.4;
        cursor: not-allowed;
      }

      .dark-warning {
        display: none;
        margin-top: 10px;
        background: #1a1200;
        border: 1px solid #3a2800;
        border-radius: 8px;
        padding: 8px 10px;
        font-size: 11px;
        color: #a07830;
        line-height: 1.4;
      }

      .hostname {
        margin-top: 12px;
        font-size: 11px;
        color: #777;
        text-align: center;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .hostname.active {
        color: #4a7fff;
        font-weight: 500;
      }

      .footer {
        margin-top: 16px;
        padding-top: 12px;
        border-top: 1px solid #222;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .footer-top {
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .footer-text {
        font-size: 11px;
        color: #888;
      }

      .footer-link {
        font-size: 11px;
        color: #4a7fff;
        text-decoration: none;
      }
      .footer-link:hover {
        text-decoration: underline;
      }

      .footer-rps {
        font-size: 11px;
        color: #888;
        text-align: center;
      }
      .footer-rps a {
        color: #5dc25d;
        text-decoration: none;
        font-weight: 500;
      }
      .footer-rps a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="icon">🌙</div>
      <div class="title">Dark Mode Viewer</div>
    </div>

    <div class="toggle-row" id="toggleRow">
      <div class="toggle-label">
        Dark mode
        <span id="statusText">Off for this site</span>
      </div>
      <label class="switch">
        <input type="checkbox" id="toggleInput" />
        <span class="slider"></span>
      </label>
    </div>

    <div class="dark-warning" id="darkWarning">
      ⚠️ This page already appears dark. Enabling may affect colors or invert
      the appearance.
    </div>

    <div class="hostname" id="hostnameEl">-</div>

    <div class="footer">
      <div class="footer-top">
        <span class="footer-text"
          >Lightweight · No tracking ·
          <a
            class="footer-link"
            href="https://github.com/AlexDegerman/lightweight-dark-mode-viewer"
            target="_blank"
            >Source code</a
          ></span
        >
      </div>
      <div class="footer-rps">
        🎮
        <a
          href="https://rpsleaguegame.vercel.app/?utm_source=darkviewer"
          target="_blank"
          >RPS League</a
        >
        - real-time incremental game
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
